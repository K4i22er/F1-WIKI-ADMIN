<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Admin Dashboard</title>
    <link rel="stylesheet" href="Dashboard.css">
</head>
<body class="admin-body">

    <div class="red-header">
        <img src="./download (1).png" class="logo">
        <div class="header-right">
            <a href="#" class="store-box">STORE</a>
            <a href="login.html" class="login-link">LOG IN</a>
        </div>
    </div>

    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="admin-profile">
                <p>ADMIN DASHBOARD</p>
                <img src="./alonso.png" class="profile-img">
                <p class="profile-label">PROFILE</p>
            </div>
            <div class="sidebar-links">
                <div class="sidebar-item">USERNAME</div>
                <div class="sidebar-item">PASSWORD: ***************</div>
                <div class="sidebar-item active-admin">EDIT DRIVERS</div>
                <div class="sidebar-item">EDIT TEAMS</div>
                <div class="sidebar-item">EDIT STANDING</div>
                <div class="sidebar-item">EDIT SCHEDULE</div>
                <div class="sidebar-item">EDIT CIRCUITS</div>
                <div class="sidebar-logout">LOG OUT</div>
            </div>
        </div>

        <div class="admin-content">
            <div class="add-photo-box">
                <div class="photo-placeholder">👤</div>
                <p>ADD PHOTO</p>
            </div>

            <div class="form-group">
                <label>NAME:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>TEAM:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>NATIONALITY:</label>
                <input type="text">
            </div>

            <div class="form-actions">
                <span class="remove-btn">REMOVE DRIVER</span>
                <span class="add-btn">ADD DRIVER</span>
            </div>
        </div>
    </div>

</body>
</html>
