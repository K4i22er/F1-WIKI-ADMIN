<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Login - Lab Project</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="red-header">
        <img src="./download (1).png" class="logo">
        <div class="header-right">
            <a href="https://f1store4.formula1.com/en/" class="store-box">STORE</a>
            <a href="login.html" class="login-link">LOG IN</a>

        </div>
    </div>

    <div class="hero-section">
        <img src="./image.jpg" class="hero-bg">
        <div class="hero-text">
            <h1>START YOUR<br><span>ENGINES</span></h1>
        </div>
    </div>

    <div class="page-wrapper login-wrapper">
        <div class="login-container">
            
            <div class="login-left">
                <h2>Sign in</h2>
                <p>or <a >create an account</a></p>
            </div>

            <div class="login-right">
                <div class="input-group">
                    <label>EMAIL/USERNAME:</label>
                    <input type="text">
                    <a  class="forgot">Forgot email?</a>
                </div>

                <div class="input-group">
                    <label>PASSWORD:</label>
                    <input type="password">
                    <a  class="forgot">Forgot Password?</a>
                </div>

                <div class="input-group">
                    <a href="Dashboard.html">Log in</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
